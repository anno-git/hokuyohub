sensors:
  - id: sensor1
    type: hokuyo_urg_eth
    name: hokuyo-a
    endpoint: 10.0.0.100:10940
    enabled: true
    mode: ME
    interval: 0
    skip_step: 1
    ignore_checkSumError: 1
    pose:
      tx: 0
      ty: 0
      theta: 0
    mask:
      angle:
        min: -135
        max: 135
      range:
        near: 0.0500000007
        far: 15
dbscan:
  eps_norm: 5
  minPts: 5
  k_scale: 1
  h_min: 0.00999999978
  h_max: 0.200000003
  R_max: 5
  M_max: 600
prefilter:
  enabled: true
  neighborhood:
    enabled: true
    k: 5
    r_base: 0.0500000007
    r_scale: 1
  spike_removal:
    enabled: false
    dr_threshold: 0.300000012
    window_size: 3
  outlier_removal:
    enabled: true
    median_window: 5
    outlier_threshold: 2
    use_robust_regression: false
  intensity_filter:
    enabled: false
    min_intensity: 0
    min_reliability: 0
  isolation_removal:
    enabled: true
    min_cluster_size: 3
    isolation_radius: 0.100000001
postfilter:
  enabled: true
  isolation_removal:
    enabled: true
    min_points_size: 3
    isolation_radius: 0.200000003
    required_neighbors: 2
ui:
  listen: 0.0.0.0:8081
security:
  api_token: ""
world_mask:
  include:
    []
  exclude:
    []
sinks:
  - type: nng
    url: tcp://0.0.0.0:5555
    encoding: msgpack
    cluster_topic: /hokuyohub/cluster
    raw_topic: /hokuyohub/raw
    rate_limit: 120
    send_clusters: true
    send_raw: false
  - type: osc
    url: 127.0.0.1:10000
    in_bundle: true
    bundle_fragment_size: 0
    cluster_topic: /hokuyohub/cluster
    raw_topic: /hokuyohub/raw
    rate_limit: 120
    send_clusters: true
    send_raw: false